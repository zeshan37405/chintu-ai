plugins {
    id 'com.android.application'
}

android {
    namespace 'com.zeshan.chintuai'
    compileSdk 36

    defaultConfig {
        applicationId 'com.zeshan.chintuai'
        minSdk 26
        targetSdk 36
        versionCode 7
        versionName '1.0.1'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    lint {
        abortOnError true
        checkReleaseBuilds true
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
        }
    }
}
