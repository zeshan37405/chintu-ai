name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: chintu-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Reject embedded secrets
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE --exclude-dir=build --exclude='*.md' '(AIza[0-9A-Za-z_-]{20,}|sk-[0-9A-Za-z_-]{20,})' app; then
            echo "Potential API secret found in app sources"
            exit 1
          fi

      - name: Unit tests, lint and APK
        run: gradle clean testDebugUnitTest lintDebug assembleDebug --stacktrace --no-daemon

      - name: Verify APK exists
        run: test -s app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chintu-ai-3.0.0-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload unit-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chintu-ai-unit-tests
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chintu-ai-lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14
